name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Archive
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Select the latest available Xcode
      - name: Select Xcode
        run: |
          LATEST=$(ls /Applications | grep -E '^Xcode' | sort -rV | head -1)
          sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
          xcodebuild -version

      # XcodeGen generates the .xcodeproj from project.yml (no Xcode needed locally)
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── Simulator build — verifies code compiles (no signing required) ──────
      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project CTRebuild.xcodeproj \
            -scheme CTRebuild \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | xcpretty

      # ── Device archive — requires signing secrets ───────────────────────────
      # Add the following secrets to your GitHub repository to enable IPA builds:
      #   BUILD_CERTIFICATE_BASE64   : base64-encoded .p12 distribution certificate
      #   P12_PASSWORD               : password for the .p12 file
      #   BUILD_PROVISION_PROFILE_BASE64 : base64-encoded .mobileprovision file
      #   KEYCHAIN_PASSWORD          : any strong password for the temporary keychain
      #   DEVELOPMENT_TEAM           : your Apple Developer Team ID (e.g. AB12CD34EF)
      #
      # To base64-encode a file on macOS:
      #   base64 -i MyCert.p12 | pbcopy

      - name: Check signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️  Signing secrets not configured — skipping IPA export."
          fi

      - name: Install signing certificate
        if: steps.signing.outputs.available == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$RUNNER_TEMP/profile.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin \
            <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")")
          cp "$RUNNER_TEMP/profile.mobileprovision" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Archive
        if: steps.signing.outputs.available == 'true'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project CTRebuild.xcodeproj \
            -scheme CTRebuild \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/CTRebuild.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | xcpretty

      - name: Export IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/CTRebuild.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ipa-export"

      - name: Upload IPA
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: CTRebuild-${{ github.sha }}
          path: ${{ runner.temp }}/ipa-export/*.ipa
          retention-days: 30
