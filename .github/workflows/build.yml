name: iOS Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build, Release & Publish
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Select the latest available Xcode
      - name: Select Xcode
        run: |
          LATEST=$(ls /Applications | grep -E '^Xcode' | sort -rV | head -1)
          sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
          xcodebuild -version

      # XcodeGen generates the .xcodeproj from project.yml (no Xcode needed locally)
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── Set version ──────────────────────────────────────────────────────────
      - name: Set version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # ── Build unsigned .app for real device (AltStore will sign it) ─────────
      - name: Build unsigned app (device)
        run: |
          set -o pipefail
          xcodebuild \
            -project CTRebuild.xcodeproj \
            -scheme CTRebuild \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | xcpretty

      # ── Package .app → .ipa  (unsigned — ready for AltStore sideloading) ────
      - name: Package unsigned IPA
        id: package
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" \
            -not -path "*/simulator/*" | head -1)
          echo "Found app: $APP_PATH"

          # Ensure install/update tools see a monotonically increasing app version.
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$APP_PATH/Info.plist"
          echo "Bundled app version: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")"
          echo "Bundled app build: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")"

          mkdir -p "$RUNNER_TEMP/ipa-payload/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa-payload/Payload/"
          cd "$RUNNER_TEMP/ipa-payload"
          zip -r "$RUNNER_TEMP/CTRebuild.ipa" Payload
          SIZE=$(stat -f%z "$RUNNER_TEMP/CTRebuild.ipa")
          SHA256=$(shasum -a 256 "$RUNNER_TEMP/CTRebuild.ipa" | awk '{print $1}')
          echo "IPA size: $SIZE bytes"
          echo "IPA sha256: $SHA256"
          echo "ipa_size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "ipa_sha256=$SHA256" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release and upload IPA ─────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "$RUNNER_TEMP/CTRebuild.ipa" \
            --title "CTRebuild ${{ steps.version.outputs.version }}" \
            --notes "Automated build from commit \`${{ github.sha }}\`"

      # ── Update apps.json for AltStore ────────────────────────────────────────
      - name: Update apps.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IPA_SIZE: ${{ steps.package.outputs.ipa_size }}
          IPA_SHA256: ${{ steps.package.outputs.ipa_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          export DATE=$(date -u +%Y-%m-%d)
          export DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/CTRebuild.ipa"
          python3 -c "
          import json, os
          with open('apps.json') as f:
              data = json.load(f)
          app = data['apps'][0]
          app['version']     = os.environ['VERSION']
          app['versionDate'] = os.environ['DATE']
          app['downloadURL'] = os.environ['DOWNLOAD_URL']
          app['size']        = int(os.environ['IPA_SIZE'])
          app['sha256']      = os.environ['IPA_SHA256']
          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Commit updated apps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --staged --quiet || \
            git commit -m "chore: update apps.json for ${{ steps.version.outputs.version }} [skip ci]"
          git push
