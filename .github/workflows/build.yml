name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Archive
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Select the latest available Xcode
      - name: Select Xcode
        run: |
          LATEST=$(ls /Applications | grep -E '^Xcode' | sort -rV | head -1)
          sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
          xcodebuild -version

      # XcodeGen generates the .xcodeproj from project.yml (no Xcode needed locally)
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── Build unsigned .app for real device (AltStore will sign it) ─────────
      - name: Build unsigned app (device)
        run: |
          set -o pipefail
          xcodebuild \
            -project CTRebuild.xcodeproj \
            -scheme CTRebuild \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | xcpretty

      # ── Package .app → .ipa  (unsigned — ready for AltStore sideloading) ────
      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" \
            -not -path "*/simulator/*" | head -1)
          echo "Found app: $APP_PATH"
          mkdir -p "$RUNNER_TEMP/ipa-payload/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa-payload/Payload/"
          cd "$RUNNER_TEMP/ipa-payload"
          zip -r "$RUNNER_TEMP/CTRebuild.ipa" Payload
          echo "IPA created at $RUNNER_TEMP/CTRebuild.ipa"

      - name: Upload unsigned IPA (sideload via AltStore)
        uses: actions/upload-artifact@v4
        with:
          name: CTRebuild-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/CTRebuild.ipa
          retention-days: 30
