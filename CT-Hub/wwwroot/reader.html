<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chase Tactical QR">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Doc's Reader</title>
  <style>
    :root{
      --bg:#000;
      --card:#151515;
      --text:#ffffff;
      --muted:#b7b7b7;
      --accent:#7ac0f8;
      --accent-soft:rgba(122,192,248,.18);
      --line:rgba(122,192,248,.55);
    }
    body.light-mode{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#1a1a1a;
      --muted:#4f4f4f;
      --accent:#4c95d0;
      --accent-soft:rgba(76,149,208,.14);
      --line:rgba(76,149,208,.45);
    }
    *{box-sizing:border-box}
    .hidden{display:none!important}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Segoe UI,Arial,sans-serif;
      min-height:100vh;
      padding:0;
      overflow:hidden;
    }
    .title{font-size:24px;font-weight:800;color:var(--accent);margin:0 0 6px}
    .subtitle{font-size:14px;color:var(--muted);margin:0}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .btn{
      border:2px solid var(--line);
      background:var(--accent-soft);
      color:var(--text);
      border-radius:10px;
      padding:11px 14px;
      text-decoration:none;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      min-height:46px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.primary{background:var(--accent);color:#111;border-color:var(--accent)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .page-label{font-size:15px;font-weight:700;color:var(--text);min-width:100px;text-align:center}
    .mode-group{display:flex;gap:8px;align-items:center}
    .mode-group .btn.active{background:var(--accent);color:#111;border-color:var(--accent)}
    .status{font-size:14px;color:var(--muted)}
    .viewer-wrap{
      position:fixed;
      inset:0;
      background:#000;
      border:none;
      border-radius:0;
      padding:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .sidepanel-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1200}
    .sidepanel-bottom{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      max-height:80vh;
      transform:translateY(100%);
      transition:transform .22s ease;
      z-index:1201;
      background:rgba(8,12,20,.96);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-top:2px solid var(--line);
      border-radius:16px 16px 0 0;
      padding:0 12px;
      padding-bottom:max(12px,env(safe-area-inset-bottom));
      overflow-y:auto;
      overflow-x:hidden;
    }
    .panel-handle{
      width:40px;
      height:4px;
      background:rgba(255,255,255,.25);
      border-radius:2px;
      margin:10px auto 12px;
    }
    .page-indicator{
      position:fixed;
      bottom:max(16px,env(safe-area-inset-bottom));
      left:50%;
      transform:translateX(-50%);
      z-index:1100;
      background:rgba(15,15,15,.82);
      border:1.5px solid rgba(255,255,255,.18);
      border-radius:20px;
      padding:6px 18px;
      font-size:13px;
      font-weight:700;
      color:#fff;
      cursor:pointer;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      -webkit-tap-highlight-color:transparent;
      white-space:nowrap;
    }
    .panel-title{font-size:20px;font-weight:800;color:var(--accent);margin:0 0 6px}
    .panel-sub{font-size:13px;color:var(--muted);margin:0 0 10px}
    .panel-stack{display:flex;flex-direction:column;gap:8px}
    .panel-row{display:flex;gap:8px}
    .panel-row .btn{flex:1}
    .panel-control{display:flex;flex-direction:column;gap:6px;margin-top:2px}
    .panel-control label{font-size:13px;color:var(--muted);font-weight:700}
    .panel-control input[type="range"]{
      width:100%;
      height:36px;
      padding:8px 0;
      margin:4px 0;
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
      background:transparent;
    }
    .panel-control input[type="range"]::-webkit-slider-container{ min-block-size:36px; }
    .panel-control input[type="range"]::-webkit-slider-runnable-track{
      height:6px;
      border-radius:3px;
      background:rgba(122,192,248,.35);
    }
    .panel-control input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:28px;
      height:28px;
      border-radius:50%;
      background:var(--accent);
      margin-top:-11px;
      box-shadow:0 1px 6px rgba(0,0,0,.5);
    }
    .re-range{
      height:36px;
      padding:8px 0;
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
      background:transparent;
    }
    .re-range::-webkit-slider-runnable-track{
      height:6px;
      border-radius:3px;
      background:rgba(122,192,248,.35);
    }
    .re-range::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:26px;
      height:26px;
      border-radius:50%;
      background:var(--accent);
      margin-top:-10px;
      box-shadow:0 1px 6px rgba(0,0,0,.5);
    }
    .panel-control .panel-value{font-size:12px;color:var(--muted);text-align:right}
    .panel-control .panel-check{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);font-weight:700}
    .panel-control .panel-check input{transform:scale(1.15)}
    body.sidepanel-bottom-open .sidepanel-bottom{transform:translateY(0)}
    body.sidepanel-bottom-open .sidepanel-backdrop{display:block}
    canvas{
      width:auto;
      height:auto;
      max-width:none;
      border-radius:0;
      display:block;
      margin:0 auto;
      background:#fff;
    }
    .text-view{
      width:100%;
      height:100%;
      min-height:0;
      border-radius:0;
      border:none;
      background:transparent;
      color:var(--text);
      padding:0;
      font-size:17px;
      line-height:1.55;
      white-space:normal;
      overflow-x:auto;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }
    body.light-mode .text-view{background:transparent}
    .text-page{
      position:relative;
      background:#fff;
      color:#111;
      overflow:visible;
      flex:0 0 auto;
      margin:0;
      border-radius:8px;
      box-shadow:0 2px 24px rgba(0,0,0,.45);
    }
    .text-run{
      position:absolute;
      display:block;
      white-space:pre-wrap;
      overflow-wrap:break-word;
      word-break:break-word;
      color:#111;
      line-height:1.2;
      overflow:visible;
      transform-origin:top left;
      pointer-events:none;
      user-select:text;
    }
    .panel-search-wrap{
      display:flex;
      gap:6px;
      align-items:stretch;
    }
    .panel-search-wrap input{
      flex:1;
      background:rgba(255,255,255,.08);
      border:2px solid var(--line);
      border-radius:8px;
      color:var(--text);
      font-size:14px;
      padding:8px 10px;
      outline:none;
      min-width:0;
    }
    .panel-search-wrap input::placeholder{color:var(--muted)}
    .panel-search-wrap input:focus{border-color:var(--accent)}
    .search-results{
      display:flex;
      flex-direction:column;
      gap:4px;
      max-height:220px;
      overflow-y:auto;
      margin-top:2px;
    }
    .search-result-item{
      background:rgba(122,192,248,.10);
      border:1px solid var(--line);
      border-radius:7px;
      padding:7px 10px;
      font-size:13px;
      color:var(--text);
      cursor:pointer;
      line-height:1.3;
    }
    .search-result-item:active{background:var(--accent-soft)}
    .search-result-page{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:2px}
    .search-result-snippet em{background:rgba(249,115,22,.35);border-radius:2px;font-style:normal;font-weight:700}
    .search-none{font-size:13px;color:var(--muted);padding:4px 2px}
    .doc-status-bar{
      position:fixed;
      bottom:max(16px,env(safe-area-inset-bottom));
      right:12px;
      z-index:1100;
      display:flex;
      flex-direction:row;
      gap:6px;
      align-items:center;
    }
    .doc-status-btn{
      display:flex;
      align-items:center;
      gap:5px;
      background:rgba(15,15,15,.82);
      border:1.5px solid rgba(255,255,255,.18);
      border-radius:20px;
      padding:6px 14px;
      font-size:13px;
      font-weight:700;
      color:#fff;
      cursor:pointer;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      transition:border-color .15s, background .15s;
      -webkit-tap-highlight-color:transparent;
      white-space:nowrap;
    }
    .doc-status-btn.active-picked{
      border-color:#f97316;
      background:rgba(249,115,22,.22);
      color:#f97316;
    }
    .doc-status-btn.active-shipped{
      border-color:#f97316;
      background:rgba(249,115,22,.22);
      color:#f97316;
    }
    .doc-status-btn .chk-box{
      width:14px;
      height:14px;
      border:1.5px solid currentColor;
      border-radius:3px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      flex-shrink:0;
    }
    .doc-stamp{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1050;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      overflow:hidden;
      contain:layout paint;
    }
    .doc-stamp-text{
      font-size:clamp(52px, 14vw, 96px);
      font-weight:900;
      letter-spacing:.08em;
      color:#f97316;
      opacity:.55;
      border:6px solid #f97316;
      border-radius:8px;
      padding:4px 18px;
      line-height:1;
      white-space:nowrap;
      transform:rotate(-30deg);
      max-width:90vw;
    }
    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }
    .text-view.scroll-locked{ overflow:hidden; }
    .text-run.run-selected{
      outline:2px solid #f97316;
      outline-offset:1px;
      border-radius:2px;
    }
    #runEditor{
      position:fixed;
      z-index:2000;
      background:rgba(8,12,20,.97);
      border:2px solid var(--line);
      border-radius:12px;
      padding:10px 14px 12px;
      min-width:230px;
      max-width:82vw;
      box-shadow:0 4px 24px rgba(0,0,0,.6);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      display:none;
    }
    #runEditor.visible{ display:block; }
    #runEditor .re-title{
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      margin-bottom:8px;
      padding-right:20px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    #runEditor .re-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }
    #runEditor .re-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      width:46px;
      flex-shrink:0;
    }
    #runEditor .re-range{ flex:1; }
    #runEditor .re-val{
      font-size:12px;
      color:var(--text);
      width:38px;
      text-align:right;
      flex-shrink:0;
    }
    #runEditor .re-close{
      position:absolute;
      top:7px;
      right:10px;
      background:none;
      border:none;
      color:var(--muted);
      font-size:18px;
      cursor:pointer;
      padding:0;
      line-height:1;
    }
    #runEditor .re-reset{
      margin-top:4px;
      width:100%;
      background:rgba(249,115,22,.18);
      border:1.5px solid rgba(249,115,22,.5);
      border-radius:7px;
      color:#f97316;
      font-size:12px;
      font-weight:700;
      padding:5px 0;
      cursor:pointer;
    }
    body.run-edit-mode .text-run{ pointer-events:auto; cursor:crosshair; }
    @keyframes pageSlideUp   { from{ transform:translateY(100%); opacity:.4 } to{ transform:translateY(0); opacity:1 } }
    @keyframes pageSlideDown { from{ transform:translateY(-100%); opacity:.4 } to{ transform:translateY(0); opacity:1 } }
    .page-enter-next{ animation:pageSlideUp   .32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
    .page-enter-prev{ animation:pageSlideDown .32s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  </style>
</head>
<body>
  <p id="docName" class="sr-only">Preparing document...</p>
  <div id="status" class="sr-only" aria-live="polite">Loading PDF...</div>

  <div id="sidepanelBackdrop" class="sidepanel-backdrop"></div>
  <div id="sidepanelBottom" class="sidepanel-bottom" aria-hidden="true">
    <div class="panel-handle"></div>
    <p id="pageLabel" class="panel-sub" style="text-align:center;margin-bottom:8px">Page 0 / 0</p>
    <div class="panel-stack">
      <div class="panel-control" style="margin-bottom:2px">
        <label for="searchInput" style="font-size:13px;color:var(--muted);font-weight:700">Search Document</label>
        <div class="panel-search-wrap" style="margin-top:4px">
          <input id="searchInput" type="search" placeholder="Search all pages&#x2026;" autocomplete="off" />
          <button id="searchBtn" class="btn" type="button" style="padding:8px 12px;min-height:0">Go</button>
        </div>
        <button id="clearSearchBtn" class="btn" type="button" style="margin-top:6px;display:none">Clear Search</button>
        <div id="searchResults" class="search-results"></div>
      </div>
      <button id="fullscreenBtn" class="btn" type="button">Fullscreen</button>
      <div class="panel-row">
        <button id="lockScrollBtn" class="btn primary" type="button">&#x1F512; Lock Scroll: On</button>
        <button id="runEditModeBtn" class="btn" type="button">&#x270F; Edit Runs: Off</button>
      </div>
      <div class="panel-control">
        <label for="pageZoomXRange">Page Zoom X (Width)</label>
        <input id="pageZoomXRange" type="range" min="0.50" max="3.00" step="0.05" value="1.00" />
        <div id="pageZoomXValue" class="panel-value">100%</div>
      </div>
      <div class="panel-control">
        <label for="pageZoomYRange">Page Zoom Y (Height)</label>
        <input id="pageZoomYRange" type="range" min="0.50" max="3.00" step="0.05" value="1.00" />
        <div id="pageZoomYValue" class="panel-value">100%</div>
      </div>
      <div class="panel-control">
        <label for="textSizeYRange">Text Size Y (Height)</label>
        <input id="textSizeYRange" type="range" min="0.50" max="3.00" step="0.05" value="1.00" />
        <div id="textSizeYValue" class="panel-value">100%</div>
      </div>
      <div class="panel-control">
        <label for="textSizeXRange">Text Size X (Width)</label>
        <input id="textSizeXRange" type="range" min="0.25" max="3.00" step="0.05" value="1.00" />
        <div id="textSizeXValue" class="panel-value">100%</div>
      </div>
      <div class="panel-control">
        <label for="textSpacingXRange">Text Spacing X (Letter)</label>
        <input id="textSpacingXRange" type="range" min="-2" max="12" step="0.5" value="0" />
        <div id="textSpacingXValue" class="panel-value">0px</div>
      </div>
      <div class="panel-control">
        <label for="textSpacingYRange">Text Spacing Y (Line)</label>
        <input id="textSpacingYRange" type="range" min="0.50" max="3.00" step="0.05" value="1.00" />
        <div id="textSpacingYValue" class="panel-value">100%</div>
      </div>
      <div class="panel-control">
        <label for="fontPickerSelect">Font</label>
        <select id="fontPickerSelect" style="width:100%;background:rgba(255,255,255,.08);border:2px solid var(--line);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;appearance:none;-webkit-appearance:none;">
          <option value="">— PDF Original —</option>
          <optgroup label="Sans-Serif">
            <option value="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">System UI</option>
            <option value="'Arial',sans-serif">Arial</option>
            <option value="'Helvetica Neue','Helvetica',sans-serif">Helvetica Neue</option>
            <option value="'Calibri',sans-serif">Calibri</option>
            <option value="'Verdana',sans-serif">Verdana</option>
            <option value="'Tahoma',sans-serif">Tahoma</option>
            <option value="'Trebuchet MS',sans-serif">Trebuchet MS</option>
            <option value="'Gill Sans','Gill Sans MT',sans-serif">Gill Sans</option>
            <option value="'Century Gothic',sans-serif">Century Gothic</option>
            <option value="'Futura','Century Gothic',sans-serif">Futura</option>
            <option value="'Optima',sans-serif">Optima</option>
          </optgroup>
          <optgroup label="Serif">
            <option value="'Georgia',serif">Georgia</option>
            <option value="'Times New Roman','Times',serif">Times New Roman</option>
            <option value="'Palatino','Palatino Linotype',serif">Palatino</option>
            <option value="'Book Antiqua','Palatino',serif">Book Antiqua</option>
            <option value="'Garamond','EB Garamond',serif">Garamond</option>
            <option value="'Baskerville','Baskerville Old Face',serif">Baskerville</option>
            <option value="'Cambria',serif">Cambria</option>
          </optgroup>
          <optgroup label="Monospace">
            <option value="'Courier New','Courier',monospace">Courier New</option>
            <option value="'Consolas','Lucida Console',monospace">Consolas</option>
            <option value="'Menlo','Monaco',monospace">Menlo</option>
            <option value="'SF Mono','Fira Mono',monospace">SF Mono</option>
          </optgroup>
          <optgroup label="Condensed / Display">
            <option value="'Arial Narrow',sans-serif">Arial Narrow</option>
            <option value="'Impact','Franklin Gothic Heavy',sans-serif">Impact</option>
            <option value="'Franklin Gothic Medium',sans-serif">Franklin Gothic</option>
            <option value="'Rockwell',serif">Rockwell</option>
          </optgroup>
          <optgroup label="Rounded / Friendly">
            <option value="'Nunito',system-ui,sans-serif">Nunito</option>
            <option value="'Varela Round',sans-serif">Varela Round</option>
          </optgroup>
        </select>
      </div>
      <div class="panel-control">
        <label class="panel-check" for="textBoldToggle">
          <input id="textBoldToggle" type="checkbox" />
          <span>Bold Text</span>
        </label>
      </div>
      <div class="panel-control" style="margin-top:4px;border-top:1px solid var(--line);padding-top:10px">
        <label style="font-size:13px;color:var(--muted);font-weight:700">Sort &amp; Filter</label>
        <div class="panel-row" style="margin-top:6px">
          <button id="sortBtn" class="btn" type="button" style="flex:1;text-align:left" title="Cycle sort order">Sort: Default</button>
        </div>
        <div style="margin-top:6px">
          <label class="panel-check" for="hideShippedToggle">
            <input id="hideShippedToggle" type="checkbox" />
            <span>Hide Shipped Pages</span>
          </label>
        </div>
      </div>
      <div class="panel-control" style="margin-top:4px;border-top:1px solid var(--line);padding-top:10px">
        <label style="font-size:13px;color:var(--muted);font-weight:700">Settings</label>
        <div class="panel-row" style="margin-top:8px;gap:8px">
          <button id="exportSettingsBtn" class="btn" type="button" style="flex:1">&#x2B07; Export</button>
          <button id="importSettingsBtn" class="btn" type="button" style="flex:1">&#x2B06; Import</button>
          <input id="importSettingsFile" type="file" accept=".json" style="display:none" />
        </div>
      </div>
      <div class="panel-control" style="margin-top:4px;border-top:1px solid var(--line);padding-top:10px">
        <button id="resetAllBtn" class="btn" type="button" style="width:100%;background:#c0392b;color:#fff;font-weight:700">&#x21BA; Reset All to Default</button>
      </div>
    </div>
  </div>

  <div id="viewerWrap" class="viewer-wrap">
    <div id="textView" class="text-view"></div>
  </div>



  <!-- Hidden status elements (used by JS for state tracking) -->
  <button id="pageIndicator" style="display:none" type="button" aria-label="Open controls"></button>
  <div style="display:none">
    <button id="pickedToggle" type="button" aria-pressed="false">
      <span id="pickedChkBox"></span>
      <span id="pickedLabel">Picked</span>
    </button>
    <button id="shippedToggle" type="button" aria-pressed="false">
      <span id="shippedChkBox"></span>
      <span id="shippedLabel">Shipped</span>
    </button>
  </div>

  <!-- Center stamp overlay -->
  <div id="docStamp" class="doc-stamp hidden"></div>

  <!-- Run editor popover -->
  <div id="runEditor" role="dialog" aria-label="Run spacing editor">
    <button class="re-close" id="runEditorClose" type="button" aria-label="Close">&times;</button>
    <div class="re-title" id="runEditorTitle">Run: &ldquo;&rdquo;</div>
    <div class="re-row">
      <span class="re-label">Nudge X</span>
      <input class="re-range" id="reNudgeX" type="range" min="-150" max="150" step="1" value="0" />
      <span class="re-val" id="reNudgeXVal">0px</span>
    </div>
    <div class="re-row">
      <span class="re-label">Nudge Y</span>
      <input class="re-range" id="reNudgeY" type="range" min="-150" max="150" step="1" value="0" />
      <span class="re-val" id="reNudgeYVal">0px</span>
    </div>
    <div class="re-row">
      <span class="re-label">Size</span>
      <input class="re-range" id="reSize" type="range" min="0.25" max="4" step="0.05" value="1" />
      <span class="re-val" id="reSizeVal">100%</span>
    </div>
    <button class="re-reset" id="reReset" type="button">Reset this run</button>
  </div>

  <script type="module">
    (async function() {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') document.body.classList.add('light-mode');

      const viewerWrapEl = document.getElementById('viewerWrap');

      const qs = new URLSearchParams(window.location.search);
      const file = (qs.get('file') || '').trim();
      const docName = document.getElementById('docName');
      const statusEl = document.getElementById('status');
      const pageLabel = document.getElementById('pageLabel');
      const pageIndicator = document.getElementById('pageIndicator');
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const textSizeRange = document.getElementById('textSizeYRange');
      const textSizeValue = document.getElementById('textSizeYValue');
      const pageZoomXRange = document.getElementById('pageZoomXRange');
      const pageZoomXValue = document.getElementById('pageZoomXValue');
      const pageZoomYRange = document.getElementById('pageZoomYRange');
      const pageZoomYValue = document.getElementById('pageZoomYValue');
      const textBoldToggle = document.getElementById('textBoldToggle');
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');
      const searchResults = document.getElementById('searchResults');
      const clearSearchBtn = document.getElementById('clearSearchBtn');
      const sortBtn = document.getElementById('sortBtn');
      const hideShippedToggle = document.getElementById('hideShippedToggle');
      const pickedToggle = document.getElementById('pickedToggle');
      const shippedToggle = document.getElementById('shippedToggle');
      const pickedLabel = document.getElementById('pickedLabel');
      const shippedLabel = document.getElementById('shippedLabel');
      const pickedChkBox = document.getElementById('pickedChkBox');
      const shippedChkBox = document.getElementById('shippedChkBox');
      const docStamp = document.getElementById('docStamp');
      const sidepanelBottom = document.getElementById('sidepanelBottom');
      const sidepanelBackdrop = document.getElementById('sidepanelBackdrop');
      const textView = document.getElementById('textView');
      const viewerWrap = document.getElementById('viewerWrap');

      function setStatus(message) {
        if (statusEl) statusEl.textContent = message;
      }

      function setPanelOpen(open) {
        document.body.classList.toggle('sidepanel-bottom-open', !!open);
        if (sidepanelBottom) sidepanelBottom.setAttribute('aria-hidden', open ? 'false' : 'true');
      }

      if (!file) {
        setStatus('Missing file name in URL.');
        return;
      }

      docName.textContent = file;

      let pdfDoc = null;
      let currentPage = 1;

      // --- Picked / Shipped state ---
      function docStateKey(suffix) {
        return 'docstate:' + file + ':p' + currentPage + ':' + suffix;
      }
      function updateStamp(picked, shipped) {
        docStamp.innerHTML = '';
        if (picked) {
          const t = document.createElement('div');
          t.className = 'doc-stamp-text';
          t.textContent = 'PICKED';
          docStamp.appendChild(t);
        }
        if (shipped) {
          const t = document.createElement('div');
          t.className = 'doc-stamp-text';
          t.textContent = 'SHIPPED';
          docStamp.appendChild(t);
        }
        docStamp.classList.toggle('hidden', !picked && !shipped);
      }
      function applyDocState(picked, shipped) {
        pickedToggle.classList.toggle('active-picked', picked);
        pickedToggle.setAttribute('aria-pressed', String(picked));
        pickedChkBox.textContent = picked ? '\u2714' : '';
        pickedLabel.textContent = 'Picked';
        shippedToggle.classList.toggle('active-shipped', shipped);
        shippedToggle.setAttribute('aria-pressed', String(shipped));
        shippedChkBox.textContent = shipped ? '\u2714' : '';
        shippedLabel.textContent = 'Shipped';
        updateStamp(picked, shipped);
      }
      function loadDocState() {
        const picked = localStorage.getItem(docStateKey('picked')) === '1';
        const shipped = localStorage.getItem(docStateKey('shipped')) === '1';
        applyDocState(picked, shipped);
      }
      pickedToggle.addEventListener('click', () => {
        const next = pickedToggle.getAttribute('aria-pressed') !== 'true';
        localStorage.setItem(docStateKey('picked'), next ? '1' : '0');
        const shipped = shippedToggle.getAttribute('aria-pressed') === 'true';
        applyDocState(next, shipped);
      });
      shippedToggle.addEventListener('click', async () => {
        const next = shippedToggle.getAttribute('aria-pressed') !== 'true';
        localStorage.setItem(docStateKey('shipped'), next ? '1' : '0');
        const picked = pickedToggle.getAttribute('aria-pressed') === 'true';
        applyDocState(picked, next);
        if (hideShipped) await buildPageList();
      });
      loadDocState();

      // --- Full-document search ---
      async function runSearch() {
        const query = (searchInput.value || '').trim().toLowerCase();
        searchResults.innerHTML = '';
        if (!query || !pdfDoc) return;

        const searchingEl = document.createElement('div');
        searchingEl.className = 'search-none';
        searchingEl.textContent = 'Searching\u2026';
        searchResults.appendChild(searchingEl);

        const matches = [];
        for (let p = 1; p <= pdfDoc.numPages; p++) {
          const page = await pdfDoc.getPage(p);
          const layout = await extractStructuredTextLayout(page);
          if (!layout || !layout.runs) continue;
          const fullText = layout.runs.map(r => r.text).join(' ');
          const lower = fullText.toLowerCase();
          let idx = lower.indexOf(query);
          while (idx !== -1) {
            const start = Math.max(0, idx - 30);
            const end = Math.min(fullText.length, idx + query.length + 30);
            const before = fullText.slice(start, idx);
            const match = fullText.slice(idx, idx + query.length);
            const after = fullText.slice(idx + query.length, end);
            matches.push({ page: p, before, match, after });
            idx = lower.indexOf(query, idx + 1);
          }
        }

        searchResults.innerHTML = '';
        if (!matches.length) {
          const none = document.createElement('div');
          none.className = 'search-none';
          none.textContent = 'No results found.';
          searchResults.appendChild(none);
          searchPages = [];
          clearSearchBtn.style.display = 'none';
          updatePager();
          return;
        }

        // Collect unique pages in sort/filter order and activate filter
        const allFilteredPages = searchPages.length ? searchPages : Array.from({length: pdfDoc.numPages}, (_,i)=>i+1);
        const matchedSet = new Set(matches.map(m => m.page));
        searchPages = allFilteredPages.filter(p => matchedSet.has(p));
        clearSearchBtn.style.display = '';
        if (!searchPages.length) {
          const none = document.createElement('div');
          none.className = 'search-none';
          none.textContent = 'No results in current page set.';
          searchResults.appendChild(none);
          updatePager();
          return;
        }
        currentPage = searchPages[0];
        await renderPage();

        for (const m of matches) {
          const item = document.createElement('div');
          item.className = 'search-result-item';
          const pg = document.createElement('div');
          pg.className = 'search-result-page';
          pg.textContent = 'Page ' + m.page;
          const snippet = document.createElement('div');
          snippet.className = 'search-result-snippet';
          snippet.innerHTML = (m.before.length === 30 ? '\u2026' : '') +
            escHtml(m.before) + '<em>' + escHtml(m.match) + '</em>' + escHtml(m.after) +
            (m.after.length === 30 ? '\u2026' : '');
          item.appendChild(pg);
          item.appendChild(snippet);
          item.addEventListener('click', async () => {
            currentPage = m.page;
            await renderPage();
            setPanelOpen(false);
          });
          searchResults.appendChild(item);
        }
      }

      function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      searchBtn.addEventListener('click', runSearch);
      searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
      clearSearchBtn.addEventListener('click', async () => {
        searchInput.value = '';
        searchResults.innerHTML = '';
        clearSearchBtn.style.display = 'none';
        // Rebuild page list with current sort/filter (don't reset those)
        await buildPageList();
      });

      const textOverrideFonts = ['Nunito','Varela Round'];
      function loadGoogleFont(name) {
        const id = 'gfont-' + name.replace(/\s/g,'');
        if (!document.getElementById(id)) {
          const l = document.createElement('link');
          l.id = id; l.rel = 'stylesheet';
          l.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(name) + ':wght@400;700&display=swap';
          document.head.appendChild(l);
        }
      }
      const textViewSettings = {
        pageZoomX: parseFloat(localStorage.getItem('readerPageZoomX') || '1.00'),
        pageZoomY: parseFloat(localStorage.getItem('readerPageZoomY') || '1.00'),
        textSizeY: parseFloat(localStorage.getItem('readerTextSizeY') || '1.00'),
        textSizeX: parseFloat(localStorage.getItem('readerTextSizeX') || '1.00'),
        textSpacingX: parseFloat(localStorage.getItem('readerTextSpacingX') || '0'),
        textSpacingY: parseFloat(localStorage.getItem('readerTextSpacingY') || '1'),
        forceBold: localStorage.getItem('readerForceBold') === '1',
        fontOverride: localStorage.getItem('readerFont') || ''
      };
      const READER_VIEWPORT_BASE_WIDTH_KEY = 'readerViewportBaseWidth';
      let hostZoomFactor = 0.5;
      let referenceViewerWidth = parseFloat(localStorage.getItem(READER_VIEWPORT_BASE_WIDTH_KEY) || '0');

      function getReferenceViewerWidth() {
        if (Number.isFinite(referenceViewerWidth) && referenceViewerWidth > 0) return referenceViewerWidth;
        const currentWidth = Math.max(1, viewerWrap?.clientWidth || 0);
        referenceViewerWidth = currentWidth;
        localStorage.setItem(READER_VIEWPORT_BASE_WIDTH_KEY, String(referenceViewerWidth));
        return referenceViewerWidth;
      }

      function captureReferenceViewerWidth() {
        const currentWidth = Math.max(1, viewerWrap?.clientWidth || 0);
        if (!Number.isFinite(currentWidth) || currentWidth <= 0) return getReferenceViewerWidth();
        referenceViewerWidth = currentWidth;
        localStorage.setItem(READER_VIEWPORT_BASE_WIDTH_KEY, String(referenceViewerWidth));
        return referenceViewerWidth;
      }

      // Preload saved Google Font on startup
      textOverrideFonts.forEach(name => {
        if (textViewSettings.fontOverride.includes(name)) loadGoogleFont(name);
      });
      const textCache = new Map();
      // Per-run overrides: key = `p${pageNum}:r${runIndex}`, value = { dx, dy, sizeScale }
      // Persisted per file in localStorage
      const RUN_OVERRIDES_KEY = 'runOverrides:' + file;
      const runOverrides = new Map(
        Object.entries(JSON.parse(localStorage.getItem(RUN_OVERRIDES_KEY) || '{}'))
      );
      function saveRunOverrides() {
        const obj = {};
        runOverrides.forEach((v, k) => { obj[k] = v; });
        localStorage.setItem(RUN_OVERRIDES_KEY, JSON.stringify(obj));
      }
      let searchPages = []; // empty = no filter; populated after search
      const pageMetaCache = new Map(); // pageNum -> { date, soNum, bin }

      // Sort modes: default (page order), date, soNum, bin
      const SORT_MODES = ['default', 'date', 'soNum', 'bin'];
      const SORT_LABELS = { default: 'Sort: Default', date: 'Sort: Date', soNum: 'Sort: SO #', bin: 'Sort: Bin Loc' };
      let sortMode = 'default';
      let hideShipped = false;

      function extractPageMeta(pageNum, layout) {
        if (pageMetaCache.has(pageNum)) return pageMetaCache.get(pageNum);
        const text = layout && layout.runs ? layout.runs.map(r => r.text).join(' ') : '';
        // Date: matches patterns like 3/18/2026 or 03/18/2026
        const dateMatch = text.match(/\b(\d{1,2}\/\d{1,2}\/\d{4})\b/);
        // SO number: matches #SO-XX-XXXX or SO-XX-XXXX
        const soMatch = text.match(/#?(SO-[\d]+-[\d]+)/i);
        // Bin: first bin-like token e.g. 1-B-2C or 3-A-1B
        const binMatch = text.match(/\b(\d+-[A-Z]-\d+[A-Z]?)\b/);
        const meta = {
          date: dateMatch ? dateMatch[1] : '',
          soNum: soMatch ? soMatch[1].toUpperCase() : '',
          bin: binMatch ? binMatch[1] : ''
        };
        pageMetaCache.set(pageNum, meta);
        return meta;
      }

      function isPageShipped(pageNum) {
        return localStorage.getItem('docstate:' + file + ':p' + pageNum + ':shipped') === '1';
      }

      async function buildPageList() {
        if (!pdfDoc) return;
        const total = pdfDoc.numPages;

        // Ensure metadata is cached for all pages
        for (let p = 1; p <= total; p++) {
          if (!pageMetaCache.has(p)) {
            const pg = await pdfDoc.getPage(p);
            const layout = await extractStructuredTextLayout(pg);
            extractPageMeta(p, layout);
          }
        }

        let pages = Array.from({ length: total }, (_, i) => i + 1);

        // Hide shipped
        if (hideShipped) {
          pages = pages.filter(p => !isPageShipped(p));
        }

        // Sort
        if (sortMode === 'date') {
          pages.sort((a, b) => {
            const da = pageMetaCache.get(a)?.date || '';
            const db = pageMetaCache.get(b)?.date || '';
            return new Date(da) - new Date(db) || a - b;
          });
        } else if (sortMode === 'soNum') {
          pages.sort((a, b) => {
            const sa = pageMetaCache.get(a)?.soNum || '';
            const sb = pageMetaCache.get(b)?.soNum || '';
            return sa.localeCompare(sb) || a - b;
          });
        } else if (sortMode === 'bin') {
          pages.sort((a, b) => {
            const ba = pageMetaCache.get(a)?.bin || '';
            const bb = pageMetaCache.get(b)?.bin || '';
            return ba.localeCompare(bb) || a - b;
          });
        }

        searchPages = pages;
        // If current page was removed (shipped), jump to first available
        if (!searchPages.includes(currentPage) && searchPages.length) {
          currentPage = searchPages[0];
          await renderPage();
        } else {
          updatePager();
        }
      }

      sortBtn.addEventListener('click', async () => {
        const idx = SORT_MODES.indexOf(sortMode);
        sortMode = SORT_MODES[(idx + 1) % SORT_MODES.length];
        sortBtn.textContent = SORT_LABELS[sortMode];
        await buildPageList();
      });

      hideShippedToggle.addEventListener('change', async () => {
        hideShipped = hideShippedToggle.checked;
        await buildPageList();
      });

      function updateTextControlsUi() {
        if (pageZoomXRange) pageZoomXRange.value = String(textViewSettings.pageZoomX);
        if (pageZoomXValue) pageZoomXValue.textContent = Math.round(textViewSettings.pageZoomX * 100) + '%';
        if (pageZoomYRange) pageZoomYRange.value = String(textViewSettings.pageZoomY);
        if (pageZoomYValue) pageZoomYValue.textContent = Math.round(textViewSettings.pageZoomY * 100) + '%';
        if (textSizeRange) textSizeRange.value = String(textViewSettings.textSizeY);
        if (textSizeValue) textSizeValue.textContent = Math.round(textViewSettings.textSizeY * 100) + '%';
        const tsxR = document.getElementById('textSizeXRange');
        const tsxV = document.getElementById('textSizeXValue');
        if (tsxR) tsxR.value = String(textViewSettings.textSizeX);
        if (tsxV) tsxV.textContent = Math.round(textViewSettings.textSizeX * 100) + '%';
        const toxR = document.getElementById('textSpacingXRange');
        const toxV = document.getElementById('textSpacingXValue');
        const toyR = document.getElementById('textSpacingYRange');
        const toyV = document.getElementById('textSpacingYValue');
        if (toxR) toxR.value = String(textViewSettings.textSpacingX);
        if (toxV) toxV.textContent = textViewSettings.textSpacingX + 'px';
        if (toyR) toyR.value = String(textViewSettings.textSpacingY);
        if (toyV) toyV.textContent = Math.round(textViewSettings.textSpacingY * 100) + '%';
        if (textBoldToggle) textBoldToggle.checked = !!textViewSettings.forceBold;
        const fp = document.getElementById('fontPickerSelect');
        if (fp) fp.value = textViewSettings.fontOverride;
      }

      async function importPdfJs() {
        const lib = await import('/pdf.min.mjs');
        lib.GlobalWorkerOptions.workerSrc = '/pdf.worker.min.mjs';
        return lib;
      }

      function updatePager() {
        const total = pdfDoc ? pdfDoc.numPages : 0;
        let label;
        if (searchPages.length) {
          const pos = searchPages.indexOf(currentPage);
          const isSorted = sortMode !== 'default' || hideShipped;
          const prefix = isSorted ? 'Page' : 'Result';
          label = prefix + ' ' + (pos + 1) + ' / ' + searchPages.length + ' (p.' + currentPage + ')';
        } else {
          label = 'Page ' + currentPage + ' / ' + total;
        }
        if (pageLabel) pageLabel.textContent = label;
        if (pageIndicator) pageIndicator.textContent = label;
      }

      async function extractStructuredTextLayout(page) {
        if (textCache.has(page.pageNumber)) return textCache.get(page.pageNumber);

        const viewport = page.getViewport({ scale: 1 });
        const content = await page.getTextContent();
        const items = Array.isArray(content.items) ? content.items : [];
        const styles = content && content.styles ? content.styles : {};

        const runs = [];
        for (const item of items) {
          const str = String(item.str || '');
          if (!str.trim()) continue;

          const t = Array.isArray(item.transform) ? item.transform : [1, 0, 0, 1, 0, 0];
          const x = Number(t[4]) || 0;
          const y = Number(t[5]) || 0;
          const fontSize = Math.max(6, Math.abs(Number(t[3]) || 0) || Math.hypot(Number(t[2]) || 0, Number(t[3]) || 0) || 10);
          const width = Math.max(1, Number(item.width) || (str.length * fontSize * 0.5));
          const top = (viewport.height - y) - fontSize;
          const fontName = String(item.fontName || '');
          const fontFamily = (styles[fontName] && styles[fontName].fontFamily) ? String(styles[fontName].fontFamily) : 'Arial, sans-serif';

          runs.push({
            text: str,
            left: x,
            top,
            width,
            height: fontSize,
            fontSize,
            fontFamily
          });
        }

        if (!runs.length) {
          const empty = {
            pageWidth: viewport.width,
            pageHeight: viewport.height,
            runs: [],
            bounds: { left: 0, top: 0, width: viewport.width, height: viewport.height }
          };
          textCache.set(page.pageNumber, empty);
          return empty;
        }

        let minLeft = Number.POSITIVE_INFINITY;
        let minTop = Number.POSITIVE_INFINITY;
        let maxRight = Number.NEGATIVE_INFINITY;
        let maxBottom = Number.NEGATIVE_INFINITY;

        for (const run of runs) {
          minLeft = Math.min(minLeft, run.left);
          minTop = Math.min(minTop, run.top);
          maxRight = Math.max(maxRight, run.left + run.width);
          maxBottom = Math.max(maxBottom, run.top + run.height);
        }

        const pad = 8;
        const bounds = {
          left: Math.max(0, minLeft - pad),
          top: Math.max(0, minTop - pad),
          width: Math.max(1, Math.min(viewport.width, maxRight + pad) - Math.max(0, minLeft - pad)),
          height: Math.max(1, Math.min(viewport.height, maxBottom + pad) - Math.max(0, minTop - pad))
        };

        const layout = {
          pageWidth: viewport.width,
          pageHeight: viewport.height,
          runs,
          bounds
        };
        textCache.set(page.pageNumber, layout);
        return layout;
      }

      function renderStructuredTextLayout(layout) {
        textView.innerHTML = '';

        if (!layout || !Array.isArray(layout.runs) || !layout.runs.length) {
          const empty = document.createElement('div');
          empty.className = 'text-page';
          empty.style.width = '100%';
          empty.style.height = '100%';
          empty.style.display = 'flex';
          empty.style.alignItems = 'center';
          empty.style.justifyContent = 'center';
          empty.style.fontSize = '18px';
          empty.textContent = '[No extractable text on this page]';
          textView.appendChild(empty);
          return;
        }

        const wrapW = Math.max(1, viewerWrap?.clientWidth || window.innerWidth);
        const wrapH = Math.max(1, viewerWrap?.clientHeight || window.innerHeight);
        // contain-fit: use the smaller of width-fit and height-fit so the whole page fits
        const fitScaleW = wrapW / Math.max(1, layout.pageWidth);
        const fitScaleH = wrapH / Math.max(1, layout.pageHeight);
        const fitScale = Math.min(fitScaleW, fitScaleH);
        // Independent X and Y layout scales — 1.00/1.00 is now a neutral full-page fit
        const scaleX = fitScale * textViewSettings.pageZoomX;
        const scaleY = fitScale * textViewSettings.pageZoomY;
        // fontScaleY: controls font-size (glyph height); fontScaleX: applied via scaleX transform (glyph width)
        const fontScaleY = Math.sqrt(scaleX * scaleY) * textViewSettings.textSizeY;
        const fontScaleX = textViewSettings.textSizeX;
        const outW = Math.max(1, Math.floor(layout.pageWidth * scaleX));
        const outH = Math.max(1, Math.floor(layout.pageHeight * scaleY));

        const pageEl = document.createElement('div');
        pageEl.className = 'text-page';
        pageEl.style.width = outW + 'px';
        pageEl.style.height = outH + 'px';

        for (let ri = 0; ri < layout.runs.length; ri++) {
          const run = layout.runs[ri];
          const overrideKey = 'p' + currentPage + ':r' + ri;
          const ov = runOverrides.get(overrideKey) || { dx: 0, dy: 0, sizeScale: 1 };
          const span = document.createElement('span');
          span.className = 'text-run';
          span.dataset.runKey = overrideKey;
          span.textContent = run.text;
          const baseLeft = run.left * scaleX;
          const baseTop  = run.top  * scaleY * textViewSettings.textSpacingY;
          const baseFs   = Math.max(6, run.fontSize * fontScaleY);
          span.dataset.origLeft     = baseLeft + 'px';
          span.dataset.origTop      = baseTop  + 'px';
          span.dataset.origFontSize = baseFs    + 'px';
          span.style.left = (baseLeft + ov.dx) + 'px';
          span.style.top  = (baseTop  + ov.dy) + 'px';
          if (textViewSettings.textSpacingX !== 0) span.style.letterSpacing = textViewSettings.textSpacingX + 'px';
          span.style.fontSize = Math.max(6, baseFs * ov.sizeScale) + 'px';
          if (fontScaleX !== 1) span.style.transform = 'scaleX(' + fontScaleX + ')';
          if (textViewSettings.forceBold) { span.style.fontWeight = '700'; }
          span.style.fontFamily = textViewSettings.fontOverride || run.fontFamily;
          pageEl.appendChild(span);
        }

        textView.appendChild(pageEl);
      }

      function detectContentBoundsFromImageData(imageData, width, height) {
        const data = imageData.data;
        const sampleStep = 2;
        const whiteThreshold = 246;

        function pixelHasContent(idx) {
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const a = data[idx + 3];
          if (a < 8) return false;
          return (r < whiteThreshold) || (g < whiteThreshold) || (b < whiteThreshold);
        }

        function rowHasContent(y) {
          const row = y * width;
          for (let x = 0; x < width; x += sampleStep) {
            if (pixelHasContent((row + x) * 4)) return true;
          }
          return false;
        }

        function colHasContent(x, top, bottom) {
          for (let y = top; y <= bottom; y += sampleStep) {
            if (pixelHasContent((y * width + x) * 4)) return true;
          }
          return false;
        }

        let top = 0;
        while (top < height && !rowHasContent(top)) top += 1;

        let bottom = height - 1;
        while (bottom >= top && !rowHasContent(bottom)) bottom -= 1;

        if (top >= bottom) {
          return { left: 0, top: 0, width, height };
        }

        let left = 0;
        while (left < width && !colHasContent(left, top, bottom)) left += 1;

        let right = width - 1;
        while (right >= left && !colHasContent(right, top, bottom)) right -= 1;

        if (left >= right) {
          return { left: 0, top: 0, width, height };
        }

        const pad = 6;
        const cropLeft = Math.max(0, left - pad);
        const cropTop = Math.max(0, top - pad);
        const cropRight = Math.min(width - 1, right + pad);
        const cropBottom = Math.min(height - 1, bottom + pad);

        return {
          left: cropLeft,
          top: cropTop,
          width: Math.max(1, cropRight - cropLeft + 1),
          height: Math.max(1, cropBottom - cropTop + 1)
        };
      }

      async function renderPage() {
        if (!pdfDoc) return;
        updatePager();
        setStatus('Rendering page ' + currentPage + '...');
        const page = await pdfDoc.getPage(currentPage);
        const layout = await extractStructuredTextLayout(page);
        renderStructuredTextLayout(layout);
        setStatus('Page ' + currentPage + ' of ' + pdfDoc.numPages + '.');
        loadDocState();
      }

      function showTextViewError(msg) {
        textView.innerHTML = '';
        const div = document.createElement('div');
        div.style.cssText = 'padding:32px 24px;color:#f97316;font-size:15px;font-weight:700;line-height:1.5;white-space:pre-wrap;word-break:break-word;';
        div.textContent = '\u26A0\uFE0F ' + msg;
        textView.appendChild(div);
      }

      async function loadHubOverrides() {
        try {
          const resp = await fetch('/api/pdf-overrides/' + encodeURIComponent(file));
          if (!resp.ok) return;
          const data = await resp.json();
          const bundle = {};
          if (data && data.global) {
            const g = data.global;
            if (typeof g.textSizeY   === 'number')  bundle['readerTextSizeY']  = String(g.textSizeY);
            if (typeof g.textSizeX   === 'number')  bundle['readerTextSizeX']  = String(g.textSizeX);
            if (typeof g.pageZoomX   === 'number')  bundle['readerPageZoomX']  = String(g.pageZoomX);
            if (typeof g.pageZoomY   === 'number')  bundle['readerPageZoomY']  = String(g.pageZoomY);
            if (typeof g.forceBold   === 'boolean') bundle['readerForceBold']  = g.forceBold ? '1' : '0';
            if (typeof g.fontOverride === 'string') bundle['readerFont']       = g.fontOverride;
          }
          applySettingsBundle(bundle);
          runOverrides.clear();
          if (data && data.runs && typeof data.runs === 'object') {
            Object.entries(data.runs).forEach(([k, v]) => runOverrides.set(k, v));
          }
          saveRunOverrides();
        } catch {
          // fall back to localStorage defaults silently
        }
      }

      async function loadPdf() {
        showTextViewError('Loading\u2026');
        try {
          const pdfjsLib = await importPdfJs();
          const src = '/api/pdfs/' + encodeURIComponent(file);
          const loadingTask = pdfjsLib.getDocument({ url: src, withCredentials: false });
          pdfDoc = await loadingTask.promise;
          currentPage = 1;
          await loadHubOverrides();
          updatePager();
          await renderPage();
          await buildPageList();
          setStatus('Loaded. Swipe up from bottom to open controls.');
        } catch (err) {
          const msg = 'Failed to load PDF.\n' + (err && err.message ? err.message : 'Unknown error');
          setStatus(msg);
          showTextViewError(msg);
          if (fullscreenBtn) fullscreenBtn.disabled = true;
        }
      }

      pageZoomXRange?.addEventListener('input', async () => {
        captureReferenceViewerWidth();
        const next = Number(pageZoomXRange.value);
        if (!Number.isFinite(next)) return;
        textViewSettings.pageZoomX = Math.max(0.5, Math.min(3, next));
        localStorage.setItem('readerPageZoomX', String(textViewSettings.pageZoomX));
        updateTextControlsUi();
        await renderPage();
      });

      pageZoomYRange?.addEventListener('input', async () => {
        captureReferenceViewerWidth();
        const next = Number(pageZoomYRange.value);
        if (!Number.isFinite(next)) return;
        textViewSettings.pageZoomY = Math.max(0.5, Math.min(3, next));
        localStorage.setItem('readerPageZoomY', String(textViewSettings.pageZoomY));
        updateTextControlsUi();
        await renderPage();
      });

      document.getElementById('textSpacingXRange')?.addEventListener('input', async () => {
        const el = document.getElementById('textSpacingXRange');
        const next = Number(el.value);
        if (!Number.isFinite(next)) return;
        textViewSettings.textSpacingX = Math.max(-2, Math.min(12, next));
        localStorage.setItem('readerTextSpacingX', String(textViewSettings.textSpacingX));
        updateTextControlsUi();
        await renderPage();
      });

      document.getElementById('textSpacingYRange')?.addEventListener('input', async () => {
        const el = document.getElementById('textSpacingYRange');
        const next = Number(el.value);
        if (!Number.isFinite(next)) return;
        textViewSettings.textSpacingY = Math.max(0.5, Math.min(3, next));
        localStorage.setItem('readerTextSpacingY', String(textViewSettings.textSpacingY));
        updateTextControlsUi();
        await renderPage();
      });

      textSizeRange?.addEventListener('input', async () => {
        const next = Number(textSizeRange.value);
        if (!Number.isFinite(next)) return;
        textViewSettings.textSizeY = Math.max(0.5, Math.min(3, next));
        localStorage.setItem('readerTextSizeY', String(textViewSettings.textSizeY));
        updateTextControlsUi();
        await renderPage();
      });

      document.getElementById('textSizeXRange')?.addEventListener('input', async () => {
        const el = document.getElementById('textSizeXRange');
        const next = Number(el.value);
        if (!Number.isFinite(next)) return;
        textViewSettings.textSizeX = Math.max(0.25, Math.min(3, next));
        localStorage.setItem('readerTextSizeX', String(textViewSettings.textSizeX));
        updateTextControlsUi();
        await renderPage();
      });

      textBoldToggle?.addEventListener('change', async () => {
        textViewSettings.forceBold = !!textBoldToggle.checked;
        localStorage.setItem('readerForceBold', textViewSettings.forceBold ? '1' : '0');
        updateTextControlsUi();
        if (currentMode === 'text') {
          await renderPage();
        }
      });

      document.getElementById('fontPickerSelect')?.addEventListener('change', async () => {
        const fp = document.getElementById('fontPickerSelect');
        textViewSettings.fontOverride = fp.value;
        localStorage.setItem('readerFont', fp.value);
        // Preload Google Fonts for web-only fonts
        textOverrideFonts.forEach(name => {
          if (fp.value.includes(name)) loadGoogleFont(name);
        });
        await renderPage();
      });

      // Lock scroll
      let scrollLocked = true;
      textView.classList.add('scroll-locked');
      document.getElementById('lockScrollBtn')?.addEventListener('click', () => {
        scrollLocked = !scrollLocked;
        textView.classList.toggle('scroll-locked', scrollLocked);
        const btn = document.getElementById('lockScrollBtn');
        if (btn) btn.textContent = '\uD83D\uDD12 Lock Scroll: ' + (scrollLocked ? 'On' : 'Off');
        if (btn) btn.classList.toggle('primary', scrollLocked);
      });

      // Run edit mode
      let runEditMode = false;
      let selectedRunEl = null;

      function setRunEditMode(on) {
        runEditMode = on;
        document.body.classList.toggle('run-edit-mode', on);
        const btn = document.getElementById('runEditModeBtn');
        if (btn) btn.textContent = '\u270F Edit Runs: ' + (on ? 'On' : 'Off');
        if (btn) btn.classList.toggle('primary', on);
        if (!on) closeRunEditor();
      }

      document.getElementById('runEditModeBtn')?.addEventListener('click', () => {
        setRunEditMode(!runEditMode);
      });

      function closeRunEditor() {
        document.getElementById('runEditor')?.classList.remove('visible');
        if (selectedRunEl) { selectedRunEl.classList.remove('run-selected'); selectedRunEl = null; }
      }

      document.getElementById('runEditorClose')?.addEventListener('click', closeRunEditor);

      function openRunEditor(spanEl) {
        if (selectedRunEl) selectedRunEl.classList.remove('run-selected');
        selectedRunEl = spanEl;
        spanEl.classList.add('run-selected');

        const key = spanEl.dataset.runKey;
        const ov = runOverrides.get(key) || { dx: 0, dy: 0, sizeScale: 1 };

        document.getElementById('runEditorTitle').textContent = 'Run: \u201c' + spanEl.textContent.slice(0, 32) + '\u201d';
        document.getElementById('reNudgeX').value = String(ov.dx);
        document.getElementById('reNudgeXVal').textContent = ov.dx + 'px';
        document.getElementById('reNudgeY').value = String(ov.dy);
        document.getElementById('reNudgeYVal').textContent = ov.dy + 'px';
        document.getElementById('reSize').value = String(ov.sizeScale);
        document.getElementById('reSizeVal').textContent = Math.round(ov.sizeScale * 100) + '%';

        // Position popover near the span
        const rect = spanEl.getBoundingClientRect();
        const editorEl = document.getElementById('runEditor');
        editorEl.classList.add('visible');
        const eh = editorEl.offsetHeight;
        const ew = editorEl.offsetWidth;
        let top = rect.bottom + 6;
        if (top + eh > window.innerHeight - 12) top = rect.top - eh - 6;
        let left = rect.left;
        if (left + ew > window.innerWidth - 12) left = window.innerWidth - ew - 12;
        editorEl.style.top = Math.max(8, top) + 'px';
        editorEl.style.left = Math.max(8, left) + 'px';
      }

      function applyRunOverride(key, patch) {
        const existing = runOverrides.get(key) || { dx: 0, dy: 0, sizeScale: 1 };
        const updated = Object.assign({}, existing, patch);
        if (updated.dx === 0 && updated.dy === 0 && updated.sizeScale === 1) {
          runOverrides.delete(key);
        } else {
          runOverrides.set(key, updated);
        }
        saveRunOverrides();
        // Update the span in-place without full re-render
        const span = document.querySelector('[data-run-key="' + key + '"]');
        if (span) {
          const origLeft = parseFloat(span.dataset.origLeft);
          const origTop  = parseFloat(span.dataset.origTop);
          const origFs   = parseFloat(span.dataset.origFontSize);
          span.style.left     = (origLeft + updated.dx) + 'px';
          span.style.top      = (origTop  + updated.dy) + 'px';
          span.style.fontSize = Math.max(6, origFs * updated.sizeScale) + 'px';
        }
      }

      document.getElementById('reNudgeX')?.addEventListener('input', () => {
        if (!selectedRunEl) return;
        const v = Number(document.getElementById('reNudgeX').value);
        document.getElementById('reNudgeXVal').textContent = v + 'px';
        applyRunOverride(selectedRunEl.dataset.runKey, { dx: v });
      });

      document.getElementById('reNudgeY')?.addEventListener('input', () => {
        if (!selectedRunEl) return;
        const v = Number(document.getElementById('reNudgeY').value);
        document.getElementById('reNudgeYVal').textContent = v + 'px';
        applyRunOverride(selectedRunEl.dataset.runKey, { dy: v });
      });

      document.getElementById('reSize')?.addEventListener('input', () => {
        if (!selectedRunEl) return;
        const v = Number(document.getElementById('reSize').value);
        document.getElementById('reSizeVal').textContent = Math.round(v * 100) + '%';
        applyRunOverride(selectedRunEl.dataset.runKey, { sizeScale: v });
      });

      document.getElementById('reReset')?.addEventListener('click', async () => {
        if (!selectedRunEl) return;
        runOverrides.delete(selectedRunEl.dataset.runKey);
        saveRunOverrides();
        document.getElementById('reNudgeX').value = '0';
        document.getElementById('reNudgeXVal').textContent = '0px';
        document.getElementById('reNudgeY').value = '0';
        document.getElementById('reNudgeYVal').textContent = '0px';
        document.getElementById('reSize').value = '1';
        document.getElementById('reSizeVal').textContent = '100%';
        await renderPage();
        // Re-select the same run after re-render
        const reSpan = document.querySelector('[data-run-key="' + selectedRunEl?.dataset?.runKey + '"]');
        if (reSpan) openRunEditor(reSpan);
      });

      // Tap on a text-run in edit mode
      textView.addEventListener('click', (e) => {
        if (!runEditMode) return;
        const span = e.target.closest('.text-run');
        if (!span) { closeRunEditor(); return; }
        e.stopPropagation();
        openRunEditor(span);
      });

      fullscreenBtn.addEventListener('click', async () => {
        try {
          if (!document.fullscreenElement) {
            await viewerWrap.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch {}
      });

      const SETTINGS_KEYS = [
        'readerPageZoomX','readerPageZoomY','readerTextSizeY','readerTextSizeX',
        'readerTextSpacingX','readerTextSpacingY','readerFont','readerForceBold'
      ];

      function applySettingsBundle(bundle) {
        SETTINGS_KEYS.forEach(k => {
          if (bundle[k] !== undefined) localStorage.setItem(k, bundle[k]);
          else localStorage.removeItem(k);
        });
        // Reload in-memory settings
        textViewSettings.pageZoomX   = parseFloat(localStorage.getItem('readerPageZoomX')   || '1.00');
        textViewSettings.pageZoomY   = parseFloat(localStorage.getItem('readerPageZoomY')   || '1.00');
        textViewSettings.textSizeY   = parseFloat(localStorage.getItem('readerTextSizeY')   || '1.00');
        textViewSettings.textSizeX   = parseFloat(localStorage.getItem('readerTextSizeX')   || '1.00');
        textViewSettings.textSpacingX= parseFloat(localStorage.getItem('readerTextSpacingX')|| '0');
        textViewSettings.textSpacingY= parseFloat(localStorage.getItem('readerTextSpacingY')|| '1');
        textViewSettings.forceBold   = localStorage.getItem('readerForceBold') === '1';
        textViewSettings.fontOverride= localStorage.getItem('readerFont') || '';
        updateTextControlsUi();
        const fontSel = document.getElementById('fontPickerSelect');
        if (fontSel) fontSel.value = textViewSettings.fontOverride;
        const boldCb = document.getElementById('textBoldToggle');
        if (boldCb) boldCb.checked = textViewSettings.forceBold;
      }

      document.getElementById('exportSettingsBtn')?.addEventListener('click', () => {
        const bundle = {};
        SETTINGS_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v !== null) bundle[k] = v; });
        const json = JSON.stringify(bundle, null, 2);
        const a = document.createElement('a');
        a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
        a.download = 'ct-reader-settings.json';
        a.click();
      });

      document.getElementById('importSettingsBtn')?.addEventListener('click', () => {
        document.getElementById('importSettingsFile').click();
      });

      document.getElementById('importSettingsFile')?.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const bundle = JSON.parse(text);
          applySettingsBundle(bundle);
          await renderPage();
        } catch {
          alert('Could not read settings file. Make sure it is a valid CT Reader export.');
        }
        e.target.value = '';
      });

      document.getElementById('resetAllBtn')?.addEventListener('click', async () => {
        if (!confirm('Reset all reader settings and run edits to default?')) return;
        SETTINGS_KEYS.forEach(k => localStorage.removeItem(k));
        localStorage.removeItem(READER_VIEWPORT_BASE_WIDTH_KEY);
        referenceViewerWidth = 0;
        applySettingsBundle({});
        await renderPage();
      });

      let touchStartX = 0;
      let touchStartY = 0;
      viewerWrap.addEventListener('touchstart', (e) => {
        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      }, { passive: true });

      viewerWrap.addEventListener('touchend', async (e) => {
        if (!pdfDoc) return;
        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        const verticalDominant = Math.abs(dy) > Math.abs(dx);

        // Swipe up from lower quarter of screen → open controls panel
        const nearBottom = touchStartY > window.innerHeight * 0.75;
        if (nearBottom && dy < -45 && verticalDominant) {
          setPanelOpen(true);
          return;
        }

        if (!verticalDominant || Math.abs(dy) < 45) return;

        // Vertical paging: swipe up -> next page, swipe down -> previous page.
        if (dy < 0 && currentPage < pdfDoc.numPages) {
          if (searchPages.length) {
            const pos = searchPages.indexOf(currentPage);
            if (pos < searchPages.length - 1) { currentPage = searchPages[pos + 1]; await renderPage(); animatePage('next'); }
          } else {
            currentPage += 1; await renderPage(); animatePage('next');
          }
        } else if (dy > 0 && currentPage > 1) {
          if (searchPages.length) {
            const pos = searchPages.indexOf(currentPage);
            if (pos > 0) { currentPage = searchPages[pos - 1]; await renderPage(); animatePage('prev'); }
          } else {
            currentPage -= 1; await renderPage(); animatePage('prev');
          }
        }
      }, { passive: true });

      function animatePage(dir) {
        textView.classList.remove('page-enter-next', 'page-enter-prev');
        void textView.offsetWidth; // force reflow
        const cls = dir === 'next' ? 'page-enter-next' : 'page-enter-prev';
        textView.classList.add(cls);
        textView.addEventListener('animationend', () => textView.classList.remove(cls), { once: true });
      }

      sidepanelBackdrop?.addEventListener('click', () => setPanelOpen(false));
      pageIndicator?.addEventListener('click', () => setPanelOpen(true));

      let panelTouchStartX = 0;
      let panelTouchStartY = 0;
      let panelSwipeIgnored = false;
      sidepanelBottom?.addEventListener('touchstart', (e) => {
        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;
        panelSwipeIgnored = e.target?.tagName === 'INPUT' && e.target?.type === 'range';
        panelTouchStartX = t.clientX;
        panelTouchStartY = t.clientY;
      }, { passive: true });

      sidepanelBottom?.addEventListener('touchend', (e) => {
        if (panelSwipeIgnored) return;
        const t = e.changedTouches && e.changedTouches[0];
        if (!t) return;
        const dx = t.clientX - panelTouchStartX;
        const dy = t.clientY - panelTouchStartY;
        const isDownSwipe = dy > 45 && Math.abs(dy) > Math.abs(dx);
        if (isDownSwipe) setPanelOpen(false);
      }, { passive: true });

      // Expose live-settings API for Hub desktop integration.
      // Called via ExecuteScriptAsync when the Hub PDF editor settings change.
      // These Hub callbacks are kept for API compatibility but are no-ops:
      // fitScale now uses live viewport dimensions directly (no stored reference needed).
      window._readerSetHostZoomFactor = function() {};
      window._readerCaptureViewportReference = function() {};

      window._readerApplySettings = function(bundle) {
        applySettingsBundle(bundle);
        renderPage();
      };

      updateTextControlsUi();
      await loadPdf();

      // -- Intercept Ctrl+scroll, hand zoom control to WPF Hub -------------
      window.addEventListener('wheel', e => {
        if (!e.ctrlKey) return;
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1 : -1;
        try { window.chrome.webview.postMessage(JSON.stringify({ type: 'ctrlscroll', delta })); } catch {}
      }, { passive: false });

    })();
  </script>
</body>
</html>
